<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>OptiSearch - Libros</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.0/font/bootstrap-icons.css">
    <link rel="stylesheet" href="diseño/alumnos.css">
</head>
<body style="background-color: #f4f7f6;">

    <nav style="background-color: #1a252f; color: white; padding: 1rem 2rem; display: flex; justify-content: space-between; align-items: center; border-bottom: 4px solid #f39c12;">
        <div style="font-size: 1.6rem; font-weight: bold; display: flex; align-items: center; gap: 12px;">
            <i class="bi bi-book-half"></i> <span>OptiSearch</span>
        </div>
        <div>
            <span style="background-color: #e74c3c; padding: 6px 16px; border-radius: 4px; font-weight: 600; text-transform: uppercase; font-size: 0.85rem;">Administrador</span>
        </div>
    </nav>

    <div class="container mt-4">
        <div class="row">
            <div class="col-md-3">
                <div class="list-group shadow-sm">
                    <div class="list-group-item bg-dark text-white fw-bold text-center">LIBROS</div>
                    <button class="list-group-item list-group-item-action active"><i class="bi bi-person-plus"></i> Registrar</button>
                    <button class="list-group-item list-group-item-action"><i class="bi bi-search"></i> Consulta Individual</button>
                    <button class="list-group-item list-group-item-action" onclick="consultarGeneral()"><i class="bi bi-table"></i> Consulta General</button>
                    <button class="list-group-item list-group-item-action"><i class="bi bi-pencil-square"></i> Cambiar y Eliminar</button>
                </div>
                <button class="btn btn-success w-100 mt-3 fw-bold" onclick="location.href='biblioteca.html'">REGRESAR</button>
            </div>

            <div class="col-md-9" style="background: white; padding: 30px; border-radius: 12px; box-shadow: 0 10px 30px rgba(0,0,0,0.05);">
                
                <div class="imagen-fondo" style="margin-bottom: 20px; border-radius: 10px;"></div>

                <h2 class="mb-4 text-primary">Alta de Nuevo Libro</h2>

                <form id="alumnoForm" class="row g-3">
                    <div class="col-md-3">
                        <label class="form-label fw-bold">ISBN</label>
                        <input type="text" id="isbn" class="form-control" placeholder="Ej: A-100" required>
                    </div>
                    <div class="col-md-3">
                        <label class="form-label fw-bold">Título</label>
                        <input type="text" id="titulo" class="form-control" required>
                    </div>
                    <div class="col-md-3">
                        <label class="form-label fw-bold">Autores</label>
                        <input type="text" id="autores" class="form-control" required>
                    </div>
                    <div class="col-md-3">
                        <label class="form-label fw-bold">Editorial</label>
                        <input type="text" id="editorial" class="form-control">
                    </div>

                    <div class="col-md-4">
                        <label class="form-label fw-bold">AÑO DE PUBLICACIÓN</label>
                        <input type="text" id="anio_public" class="form-control" placeholder="Ej: 2026" required>
                    </div>
                    
                    <div class="col-md-12">
                        <label class="form-label fw-bold">NUMERO DE EJEMPLARES</label>
                        <input type="text" id="num_ejemplar" class="form-control" placeholder="Ej: 5" required>
                    </div>

                    <div class="col-12 mt-4">
                        <button type="submit" class="btn btn-primary px-5 fw-bold">GUARDAR EN BASE DE DATOS</button>
                        <button type="button" class="btn btn-danger px-4 ms-2" onclick="location.href='index.html'">SALIR</button>
                    </div>
                </form>

                <div id="seccionTabla" class="mt-5" style="display:none;">
                    <h3 class="text-primary">Registros Actuales</h3>
                    <div class="table-responsive">
                        <table class="table table-hover border mt-3">
                            <thead class="table-dark">
                                <tr>
                                    <th>ISBN</th>
                                    <th>Título</th>
                                    <th>Autores</th>
                                    <th>Editorial</th>
                                    <th>Año de Publicación</th>
                                    <th>Número de Ejemplares</th>
                                </tr>
                            </thead>
                            <tbody id="cuerpoTabla"></tbody>
                        </table>
                    </div>
                </div>
            </div>
        </div>
    </div>

    <script>
    // --- 1. FUNCIÓN DE REGISTRO (POST) ---
    document.getElementById('alumnoForm').addEventListener('submit', async (e) => {
        e.preventDefault(); 

        const libro = {
            isbn: document.getElementById('isbn').value,
            titulo: document.getElementById('titulo').value,
            autores: document.getElementById('autores').value,
            editorial: document.getElementById('editorial').value,
            anio_public: document.getElementById('anio_public').value,
            num_ejemplares: document.getElementById('num_ejemplar').value
        };

        try {
            const res = await fetch('http://localhost:4000/registrar-libro', {
                method: 'POST',
                headers: { 'Content-Type': 'application/json' },
                body: JSON.stringify(libro)
            });
            const result = await res.json();
            alert(result.mensaje); 
            if(result.success) e.target.reset(); 
        } catch (err) {
            alert("⚠️ Error: El servidor no responde. Verifica que Node esté corriendo en el puerto 4000.");
        }
    });

    // --- 2. FUNCIÓN DE CONSULTA GENERAL (GET) ---
    async function consultarGeneral() {
        try {
            const res = await fetch('http://localhost:4000/consultar-libro');
            const result = await res.json();

            if (result.success) {
                const tabla = document.getElementById('cuerpoTabla');
                tabla.innerHTML = ""; 
                
                result.datos.forEach(a => {
                    // Evita fallos por variaciones de nombres de columnas que envíe PostgreSQL
                    const ejemplares = a.num_ejemplar || a.num_ejemplares || a.num_exemplar || '0';

                    tabla.innerHTML += `
                        <tr>
                            <td class="fw-bold">${a.isbn || ''}</td>
                            <td>${a.titulo || ''}</td>
                            <td>${a.autores || ''}</td>
                            <td>${a.editorial || ''}</td>
                            <td>${a.anio_public || ''}</td>
                            <td>${ejemplares}</td>
                        </tr>`;
                });
                
                document.getElementById('seccionTabla').style.display = "block";
            } else {
                alert("No se pudieron obtener los datos de la consulta.");
            }
        } catch (err) {
            alert("Error al conectar con la base de datos para la consulta.");
        }
    }
</script>
</body>
</html>
