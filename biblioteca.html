<html lang="es">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />

    <meta
      http-equiv="Content-Security-Policy"
      content="default-src 'self' https://cdn.jsdelivr.net https://cdnjs.cloudflare.com https://images.unsplash.com; script-src 'self' 'unsafe-inline' https://cdn.jsdelivr.net; style-src 'self' 'unsafe-inline' https://cdn.jsdelivr.net; img-src 'self' data: https://images.unsplash.com https://cdn.jsdelivr.net; connect-src 'self' http://10.163.65.251:4000;"
    />

    <link
      href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css"
      rel="stylesheet"
    />
    <link

      href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.0/font/bootstrap-icons.css"
    />

    <style>
      body {
        background-color: #f4f7f6;
      }
      .navbar-custom {
        background-color: #1a252f;
        color: white;
        padding: 1rem 2rem;
        display: flex;
        justify-content: space-between;
        align-items: center;
        border-bottom: 4px solid #f39c12;
        margin-bottom: 2rem;
      }
      .main-content {
        background: white;
        padding: 30px;
        border-radius: 12px;
        box-shadow: 0 10px 30px rgba(0, 0, 0, 0.05);
      }
      .hero-img-container {
        border: 8px solid #f1f1f1;
        border-radius: 8px;
        overflow: hidden;
        max-height: 250px;
        margin-bottom: 30px;
      }
      .hero-img-container img {
        width: 100%;
        height: 100%;
        object-fit: cover;
      }
      .list-group-item.active {
        background-color: #f39c12;
        border-color: #f39c12;
      }
    </style>
  </head>
  <body>
    <nav class="navbar-custom">
      <div
        style="
          font-size: 1.6rem;
          font-weight: bold;
          display: flex;
          align-items: center;
          gap: 12px;
        "
      >
        <i class="bi bi-book-half"></i> <span>OptiSearch</span>
      </div>
      <div>
        <span
          class="d-none d-sm-inline"
          style="margin-right: 10px; color: #bdc3c7"
          >Usuario:</span
        >
        <span
          style="
            background-color: #e74c3c;
            padding: 6px 16px;
            border-radius: 4px;
            font-weight: 600;
            text-transform: uppercase;
            font-size: 0.85rem;
          "
          >Administrador</span
        >
      </div>
    </nav>

    <div class="container">
      <div class="row g-4">
        <!-- MENÚ LATERAL -->
        <div class="col-lg-3 col-md-4">
          <div class="list-group shadow-sm sticky-top" style="top: 20px">
            <div class="list-group-item bg-dark text-white fw-bold">
              GESTIÓN DE EMPLEADOS
            </div>
            <button
              class="list-group-item list-group-item-action active"
              onclick="location.reload()"
            >
              Registrar
            </button>
            <button class="list-group-item list-group-item-action">
              Consulta Individual
            </button>
            <button
              class="list-group-item list-group-item-action"
              onclick="consultarGeneral()"
            >
              Consulta General
            </button>
            <button class="list-group-item list-group-item-action">
              Cambiar y Eliminar
            </button>
            <button
              class="list-group-item list-group-item-action"
              onclick="location.href = 'alumnos.html'"
            >
              Ir a Alumnos
            </button>
            <button
              class="list-group-item list-group-item-action"
              onclick="location.href = 'profesores.html'"
            >
              Ir a Profesores
            </button>
            <button
              class="list-group-item list-group-item-action"
              onclick="location.href = 'libro.html'"
            >
              Ir a Libros
            </button>
            <button
              class="list-group-item list-group-item-action"
              onclick="location.href = 'Prestamos.html'"
            >
              Ir a Prestamos
            </button>
          </div>
        </div>

        <!-- CONTENIDO PRINCIPAL -->
        <div class="col-lg-9 col-md-8">
          <div class="main-content">
            <div id="contenedorFormulario">
              <div class="hero-img-container">
                <img
                  src="https://images.unsplash.com/photo-1521587760476-6c12a4b040da?q=80&w=1000"
                  alt="Biblioteca"
                />
              </div>

              <h2 class="mb-4 text-primary border-bottom pb-2">
                Alta de Nuevo Empleado
              </h2>

              <form id="empleadoForm" class="row g-3">
                <div class="col-md-3">
                  <label class="form-label fw-bold">Código</label>
                  <input
                    type="number"
                    id="empCodigo"
                    class="form-control"
                    value="777"
                    required
                  />
                </div>
                <div class="col-md-3">
                  <label class="form-label fw-bold">Nombre</label>
                  <input
                    type="text"
                    id="empNombre"
                    class="form-control"
                    placeholder="Nombre"
                    required
                  />
                </div>
                <div class="col-md-3">
                  <label class="form-label fw-bold">Apellido Paterno</label>
                  <input
                    type="text"
                    id="empApellido1"
                    class="form-control"
                    placeholder="Apellido 1"
                    required
                  />
                </div>
                <div class="col-md-3">
                  <label class="form-label fw-bold">Apellido Materno</label>
                  <input
                    type="text"
                    id="empApellido2"
                    class="form-control"
                    placeholder="Apellido 2"
                  />
                </div>

                <div class="col-md-8">
                  <label class="form-label fw-bold">Dirección</label>
                  <input
                    type="text"
                    id="empDireccion"
                    class="form-control"
                    placeholder="Calle y Número"
                    required
                  />
                </div>
                <div class="col-md-4">
                  <label class="form-label fw-bold">Teléfono</label>
                  <input
                    type="text"
                    id="empTelefono"
                    class="form-control"
                    placeholder="Número"
                    required
                  />
                </div>

                <div class="col-md-3">
                  <label class="form-label fw-bold">Sexo</label>
                  <select id="empSexo" class="form-select" required>
                    <option value="" disabled selected>Seleccione...</option>
                    <option value="F">Femenino</option>
                    <option value="M">Masculino</option>
                    <option value="X">Otro</option>
                  </select>
                </div>
                <div class="col-md-4">
                  <label class="form-label fw-bold">Turno</label>
                  <select id="empTurno" class="form-select">
                    <option value="Matutino">Matutino</option>
                    <option value="Vespertino">Vespertino</option>
                    <option value="Nocturno">Nocturno</option>
                  </select>
                </div>
                <div class="col-md-5">
                  <label class="form-label fw-bold">Fecha de Nacimiento</label>
                  <input
                    type="date"
                    id="empFechaNac"
                    class="form-control"
                    required
                  />
                </div>

                <div class="col-12 mt-4 d-flex gap-2">
                  <button
                    type="submit"
                    class="btn btn-primary px-4 fw-bold shadow-sm"
                  >
                    <i class="bi bi-person-plus-fill"></i> REGISTRAR
                  </button>
                  <button
                    type="button"
                    class="btn btn-outline-danger px-4 fw-bold"
                    onclick="location.href = 'index.html'"
                  >
                    SALIR
                  </button>
                </div>
              </form>
            </div>

            <!-- SECCIÓN DE TABLA (PASO 10) -->
            <div
              id="seccionTabla"
              class="mt-5 pt-4 border-top"
              style="display: none"
            >
              <h3 class="text-primary mb-3">
                <i class="bi bi-table"></i> Lista de Empleados Registrados
              </h3>
              <div class="table-responsive shadow-sm rounded">
                <table
                  class="table table-striped table-hover align-middle mb-0"
                >
                  <thead class="table-dark">
                    <tr>
                      <th>Código</th>
                      <th>Nombre Completo</th>
                      <th>Dirección</th>
                      <th>Teléfono</th>
                      <th>Sexo</th>
                      <th>Fecha Nac.</th>
                      <th>Turno</th>
                    </tr>
                  </thead>
                  <tbody id="cuerpoTabla"></tbody>
                </table>
              </div>
            </div>
          </div>
        </div>
      </div>
    </div>

    <script>
      const API_URL = "";

      // LÓGICA PARA REGISTRAR
      document
        .getElementById("empleadoForm")
        .addEventListener("submit", async (e) => {
          e.preventDefault();
          const datos = {
            codigo: document.getElementById("empCodigo").value,
            nombre: document.getElementById("empNombre").value,
            apellido1: document.getElementById("empApellido1").value,
            apellido2: document.getElementById("empApellido2").value,
            direccion: document.getElementById("empDireccion").value,
            telefono: document.getElementById("empTelefono").value,
            sexo: document.getElementById("empSexo").value,
            fecha_nac: document.getElementById("empFechaNac").value,
            turno: document.getElementById("empTurno").value,
          };

          try {
            const res = await fetch(`${API_URL}/registrar-empleado`, {
              method: "POST",
              headers: { "Content-Type": "application/json" },
              body: JSON.stringify(datos),
            });
            const result = await res.json();
            alert(result.mensaje);
            if (result.success) {
              e.target.reset();
              if (
                document.getElementById("seccionTabla").style.display ===
                "block"
              )
                consultarGeneral();
            }
          } catch (err) {
            alert("⚠️ Error de conexión con el servidor");
          }
        });

      // LÓGICA PARA CONSULTA GENERAL (PASO 10)
      async function consultarGeneral() {
        try {
          const res = await fetch(`${API_URL}/consultar-empleados`);
          const result = await res.json();

          if (result.success) {
            const tabla = document.getElementById("cuerpoTabla");
            const contenedor = document.getElementById("seccionTabla");
            tabla.innerHTML = "";

            result.datos.forEach((emp) => {
              const fechaLimpia = new Date(emp.fecha_nac).toLocaleDateString(
                "es-ES",
                {
                  year: "numeric",
                  month: "2-digit",
                  day: "2-digit",
                  timeZone: "UTC",
                },
              );
              tabla.innerHTML += `
                            <tr>
                                <td class="fw-bold text-primary">#${emp.codigo}</td>
                                <td>${emp.nombre} ${emp.apellido1} ${emp.apellido2}</td>
                                <td>${emp.direccion}</td>
                                <td>${emp.telefono}</td>
                                <td class="text-center"><span class="badge bg-secondary">${emp.sexo}</span></td>
                                <td>${fechaLimpia}</td> 
                                <td><span class="badge bg-info text-dark">${emp.turno}</span></td>
                            </tr>`;
            });

            contenedor.style.display = "block";
            window.scrollTo({
              top: contenedor.offsetTop - 20,
              behavior: "smooth",
            });
          }
        } catch (err) {
          alert("⚠️ Error al obtener los empleados.");
        }
      }
    </script>
  </body>
</html>
