<!DOCTYPE html>
<html lang="es">

<head>

    <meta charset="UTF-8">
    <title>OptiSearch</title>


    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.0/font/bootstrap-icons.css">
    <link rel="stylesheet" href="diseño/login.css">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/animate.css/4.1.1/animate.min.css" />
    <!--librerias de estilo-->

</head>

<body>



    <div class="mainTittle">
        <h1>OptiSearch</h1>
    </div>

    <div class="headerContainer d-flex justify-content-center gap-3">

        <a class="bi bi-heart-fill fav"></a>
        <a class="btn btn-workwood" href="../index.html">Inicio</a>
        <a class="btn btn-workwood" href="../pages/ayuda.html">Ayuda</a>



    </div>

    <div class="header">
        <div class="buscador">
            <input type="text" id="busqueda" placeholder="Buscar libros...">
            <span class="icono">
                <i class="bi bi-search"></i>
            </span>
            <button id="btnBuscar" class="btn btn-primary">Buscar</button>
        </div>
    </div>

    <!--imagen de fondo!------------------------------------------------>
    <div class="hero">

        <!-- CONTENIDO ENCIMA -->
        <div class="overlay">

            <div class="contenedor-login">

            <!-- TARJETA LOGIN  -->
            <div class="card-login">
                <h2>Iniciar sesión</h2>
                <form id="loginForm">
                    <input type="text" id="usuario" placeholder="Nombre de Usuario" required>
                            <input type="password" id="pass" placeholder="Contraseña" required>
                    <button type="submit">Aceptar</button>
                    <button type="submit">Cancelar</button>
                </form>
            </div>

        </div>
        </div>
    </div>

    <script>
    document.getElementById('loginForm').addEventListener('submit', async (e) => {
        e.preventDefault();

        // Leemos los cuadros de texto
        const u = document.getElementById('usuario').value;
        const p = document.getElementById('pass').value;

        try {
            const res = await fetch('http://localhost:3000/login', {
                method: 'POST',
                headers: { 'Content-Type': 'application/json' },
                body: JSON.stringify({ usuario: u, password: p })
            });

            const data = await res.json();
            
            // Aquí quitamos el undefined: leemos 'data.mensaje' porque así lo llamamos en el servidor
            if (data.success) {
                alert("✅ " + data.mensaje);
                window.location.href = "biblioteca.html";
            } else {
                alert("❌ " + data.mensaje);
            }
        } catch (err) {
            alert("⚠️ El servidor no responde. Revisa la terminal de VS Code.");
        }
    });
</script>

</body>

</html>
